<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AO LLM Gateway - Admin{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .htmx-indicator { opacity: 0; transition: opacity 200ms; }
        .htmx-request .htmx-indicator { opacity: 1; }
        .htmx-request.htmx-indicator { opacity: 1; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    {% if current_user %}
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <a href="/admin/dashboard" class="text-xl font-bold text-gray-800">AO LLM Gateway</a>
                    </div>
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="/admin/dashboard" 
                           class="{% if request.url.path == '/admin/dashboard' %}bg-gray-100 text-gray-900{% else %}text-gray-600 hover:bg-gray-50{% endif %} px-3 py-2 rounded-md text-sm font-medium">
                            Dashboard
                        </a>
                        <a href="/admin/keys" 
                           class="{% if '/admin/keys' in request.url.path %}bg-gray-100 text-gray-900{% else %}text-gray-600 hover:bg-gray-50{% endif %} px-3 py-2 rounded-md text-sm font-medium">
                            Access Keys
                        </a>
                        <a href="/admin/providers" 
                           class="{% if '/admin/providers' in request.url.path %}bg-gray-100 text-gray-900{% else %}text-gray-600 hover:bg-gray-50{% endif %} px-3 py-2 rounded-md text-sm font-medium">
                            Providers
                        </a>
                    </div>
                </div>
                <div class="flex items-center">
                    <span class="text-sm text-gray-600 mr-4">{{ current_user.email }}</span>
                    <form action="/auth/logout" method="post">
                        <button type="submit" class="text-sm text-gray-600 hover:text-gray-900">
                            Logout
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
