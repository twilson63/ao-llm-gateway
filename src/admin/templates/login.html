{% extends "base.html" %}
{% block content %}
<div class="login-container"
>
    <div class="login-card" id="loginCard"
>        
        <!-- Logo -->
        <div class="logo" style="text-align: center; margin-bottom: 24px;">
            <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                <rect fill="#6366f1" x="16" y="16" width="8" height="8"/>
                <rect fill="#6366f1" x="28" y="16" width="8" height="8"/>
                <rect fill="#6366f1" x="40" y="16" width="8" height="8"/>
                <rect fill="#3b82f6" x="16" y="28" width="8" height="8"/>
                <rect fill="#3b82f6" x="28" y="28" width="8" height="8"/>
                <rect fill="#3b82f6" x="40" y="28" width="8" height="8"/>
                <rect fill="#60a5fa" x="16" y="40" width="8" height="8"/>
                <rect fill="#60a5fa" x="28" y="40" width="8" height="8"/>
                <rect fill="#60a5fa" x="40" y="40" width="8" height="8"/>
            </svg>
        </div>
        
        <!-- Title -->
        <h1 style="text-align: center; font-size: 24px; font-weight: 600; color: #1e293b; margin-bottom: 8px;">AO LLM Gateway</h1>
        <p class="subtitle" style="text-align: center; color: #64748b; margin-bottom: 32px;">Admin Access</p>
        
        <!-- Error Message -->
        <div id="error-message" class="error-container" style="display: none; margin-bottom: 16px;">
            <div class="error-box" style="background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 12px; border-radius: 8px; font-size: 14px;">
                <span id="error-text"></span>
            </div>
        </div>
        
        <!-- Form -->
        <form id="loginForm" method="post" action="/auth/login">            
            <div class="form-group" style="margin-bottom: 16px;">
                <label style="display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 4px;">Email</label>
                <input 
                    type="email" 
                    name="email" 
                    id="email"
                    placeholder="admin@example.com"
                    required
                    class="form-control"
                    style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; transition: border-color 0.2s, box-shadow 0.2s; box-sizing: border-box;"
                    onfocus="this.style.borderColor='#3b82f6'; this.style.boxShadow='0 0 0 3px rgba(59, 130, 246, 0.1)';"
                    onblur="this.style.borderColor='#e5e7eb'; this.style.boxShadow='none';"
                />
            </div>
            
            <div class="form-group" style="margin-bottom: 24px;">
                <label style="display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 4px;">Password</label>
                <div class="password-wrapper" style="position: relative;">
                    <input 
                        type="password" 
                        name="password" 
                        id="password"
                        placeholder=""
                        required
                        class="form-control"
                        style="width: 100%; padding: 12px; padding-right: 40px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; transition: border-color 0.2s, box-shadow 0.2s; box-sizing: border-box;"
                        onfocus="this.style.borderColor='#3b82f6'; this.style.boxShadow='0 0 0 3px rgba(59, 130, 246, 0.1)';"
                        onblur="this.style.borderColor='#e5e7eb'; this.style.boxShadow='none';"
                    />
                    <button type="button" onclick="togglePassword()" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 16px; opacity: 0.6;">
                        👁️
                    </button>
                </div>
            </div>
            
            <!-- Submit -->
            <button type="submit" class="btn-submit" id="submitBtn"
                style="width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;"
            >
                <span id="btnText">Sign In</span>
                <span id="spinner" style="display: none; margin-left: 8px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <style>.spinner{animation:spin 1s linear infinite}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>
                        <circle class="spinner" cx="12" cy="12" r="10"/>
                    </svg>
                </span>
            </button>
            
        </form>
        
        <div style="margin-top: 16px; text-align: center;">
            <a href="/" style="color: #6b7280; font-size: 14px; text-decoration: none;">← Back to landing page</a>
        </div>
    </div>
</div>

<style>
    body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #f1f5f9 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    @keyframes cardEnter {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    #loginCard {
        animation: cardEnter 0.6s ease-out;
    }
    
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
    }
    
    .shake {
        animation: shake 0.5s ease-in-out;
    }
</style>

<script>
    // Toggle password visibility
    function togglePassword() {
        const input = document.getElementById('password');
        input.type = input.type === 'password' ? 'text' : 'password';
    }
    
    // Handle form submission with fetch
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const errorContainer = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        
        // Hide any previous error
        errorContainer.style.display = 'none';
        
        // Show loading state
        btnText.textContent = 'Signing in...';
        spinner.style.display = 'inline-block';
        btn.disabled = true;
        btn.style.opacity = '0.7';
        
        try {
            const formData = new FormData(this);
            const data = {
                email: formData.get('email'),
                password: formData.get('password')
            };
            
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data),
                credentials: 'same-origin'
            });
            
            if (response.ok) {
                // Success - redirect to admin
                window.location.href = '/admin/dashboard';
            } else {
                // Error - show message
                const data = await response.json();
                errorText.textContent = data.detail || 'Invalid credentials';
                errorContainer.style.display = 'block';
                
                // Shake animation
                document.getElementById('loginCard').classList.add('shake');
                setTimeout(() => {
                    document.getElementById('loginCard').classList.remove('shake');
                }, 500);
            }
        } catch (error) {
            errorText.textContent = 'Network error. Please try again.';
            errorContainer.style.display = 'block';
        } finally {
            // Reset button
            btnText.textContent = 'Sign In';
            spinner.style.display = 'none';
            btn.disabled = false;
            btn.style.opacity = '1';
        }
    });
</script>

{% endblock %}
